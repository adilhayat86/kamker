<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kamker is offline</title>
    <meta name="theme-color" content="#1896d3" />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f8fbff;
        color: #102033;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid #d8e8f4;
        border-radius: 18px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 18px 50px rgb(16 32 51 / 10%);
      }

      .brand {
        display: inline-grid;
        place-items: center;
        width: 54px;
        height: 54px;
        border-radius: 16px;
        background: #1896d3;
        color: #ffffff;
        font-size: 28px;
        font-weight: 800;
      }

      h1 {
        margin: 22px 0 10px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #5b6b7b;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 22px;
        border-radius: 12px;
        background: #1896d3;
        color: #ffffff;
        padding: 12px 16px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">K</div>
      <h1>You are offline</h1>
      <p>
        Kamker needs internet to search workers, login, and send requirements.
        Reconnect and try again.
      </p>
      <a href="/">Retry Kamker</a>
    </main>
  </body>
</html>
